<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/health-os-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Health OS Design System v2 — a calm, warm, fully tokenised design system for practitioners. efficient.app structure, Health OS skin."
    />
    <meta name="theme-color" content="#F9F6F2" />

    <!-- Theme: light (white, default) · paper (ivory) · dark (carbon). No flash. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (t === 'dark') document.documentElement.classList.add('dark');
          else if (t === 'paper') document.documentElement.classList.add('theme-paper');
        } catch (e) {}
      })();
    </script>

    <!-- Locked type pairing: Spline Sans (headings) + Anonymous Pro (body / mono) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@400;500;600;700&family=Anonymous+Pro:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <title>Health OS Design System v2</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
